databases:
  - name: huda-beauty-db
    plan: free
    databaseName: huda_beauty
    user: huda_user

services:
  - type: web
    name: huda-beauty
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: huda-beauty-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
