services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: huda_beauty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d huda_beauty" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: huda_beauty
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: huda-beauty-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: huda-beauty-refresh-secret-change-in-production
      CORS_ORIGIN: "*"
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  seed:
    build: .
    command: node seed.js
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: huda_beauty
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
  uploads:
